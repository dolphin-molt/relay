name = "relay"
main = "src/remote/index.ts"
compatibility_date = "2025-04-01"
workers_dev = true

# Custom domain to allow cross-Worker calls (same-zone *.workers.dev is blocked)
routes = [
  { pattern = "relay.theopcapp.com/*", zone_name = "theopcapp.com" }
]

[durable_objects]
bindings = [
  { name = "TUNNEL", class_name = "Tunnel" },
  { name = "REGISTRY", class_name = "Registry" }
]

[[migrations]]
tag = "v1"
new_classes = ["Tunnel"]

[[migrations]]
tag = "v2"
new_classes = ["Registry"]

# AUTH_TOKEN is set via: wrangler secret put AUTH_TOKEN
